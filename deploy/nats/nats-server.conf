# NATS server configuration for a re-agent pool.
#
# Clients connect OUTBOUND to this server; it relays request/reply between the
# orchestrator (responder) and pooled agents (requesters) on `re.<project>.*`
# subjects.  Payloads are small JSON, so relay bandwidth is negligible.

port: 4222
http_port: 8222          # optional monitoring at http://host:8222

# --- Authentication ---------------------------------------------------------
# Quick start: a single shared token.  Put the SAME token in each side's config:
#
#   transport:
#     token: "CHANGE_ME_SUPER_SECRET"
#
authorization {
  token: "CHANGE_ME_SUPER_SECRET"
}

# --- Per-user separation (optional) -----------------------------------------
# Prefer distinct credentials for the host vs. volunteers?  Comment out the
# `authorization { token: ... }` block above and use this instead, then set
# `transport.user` / `transport.password` on each side:
#
# authorization {
#   users: [
#     { user: "orchestrator", password: "CHANGE_ME_ORCH" }
#     { user: "agent",        password: "CHANGE_ME_AGENT",
#       permissions: {
#         # Agents only need to publish requests + receive replies on this pool.
#         publish:   { allow: ["re.>", "_INBOX.>"] }
#         subscribe: { allow: ["_INBOX.>"] }
#       }
#     }
#   ]
# }

# --- TLS (recommended for anything over the internet) -----------------------
# Generate certs, mount them into the container, then enable:
#
# tls {
#   cert_file: "/etc/nats/certs/server-cert.pem"
#   key_file:  "/etc/nats/certs/server-key.pem"
# }
#
# and set `transport.tls: true` (plus `tls_ca_file` if self-signed) on clients,
# using `nats://` -> `tls://` style servers as appropriate.
